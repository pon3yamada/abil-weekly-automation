# Meta システムユーザートークンの失効アラート
# 毎日 09:00 JST（00:00 UTC）に実行し、残り 14/10/7/5/4/3/2/1 日のタイミングで Slack 通知
# 失効後（残り0日以下）は再発行されるまで毎日通知する
#
# 有効期限は Meta Graph API（debug_token）から実測で取得する。
# META_TOKEN_GENERATED_AT + 60日 の日付計算は API が使えない場合のフォールバック。
name: Meta Token Expiry Check

on:
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'テスト用: 強制通知する（残り日数に関わらず送信）'
        type: boolean
        default: false
  schedule:
    - cron: '0 0 * * *'   # 毎日 09:00 JST

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: トークン残り日数を確認して必要なら Slack 通知
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_TOKEN_GENERATED_AT: ${{ secrets.META_TOKEN_GENERATED_AT }}
          META_TOKEN_EXPIRES_DAYS: "60"
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FORCE_NOTIFY: ${{ inputs.force_notify || 'false' }}
        run: |
          python3 - <<'EOF'
          import os, json, sys
          import urllib.request, urllib.parse
          from datetime import date, datetime, timedelta
          from zoneinfo import ZoneInfo

          JST = ZoneInfo("Asia/Tokyo")
          today = datetime.now(JST).date()

          remaining = None
          expire_date = None
          generated = None
          source = None  # "API実測" / "生成日から推定"

          # ── 優先: Graph API の debug_token で実際の有効期限を取得 ──────────
          token = os.environ.get("META_ACCESS_TOKEN", "").strip()
          if token:
              try:
                  qs = urllib.parse.urlencode({"input_token": token, "access_token": token})
                  with urllib.request.urlopen(
                      f"https://graph.facebook.com/v21.0/debug_token?{qs}", timeout=30
                  ) as resp:
                      data = json.load(resp).get("data") or {}
                  if not data:
                      raise RuntimeError("debug_token 応答に data がありません")
                  expires_at = int(data.get("expires_at") or 0)
                  is_valid = bool(data.get("is_valid"))
                  if not is_valid:
                      remaining = 0
                      expire_date = today
                      source = "API実測"
                      print("API実測: トークンは無効（is_valid=false）", flush=True)
                  elif expires_at == 0:
                      print("API実測: トークンは無期限のため通知不要です", flush=True)
                      sys.exit(0)
                  else:
                      expire_date = datetime.fromtimestamp(expires_at, JST).date()
                      remaining = (expire_date - today).days
                      source = "API実測"
                      print(f"API実測: 失効日={expire_date}  残り={remaining}日", flush=True)
              except SystemExit:
                  raise
              except Exception as exc:
                  print(f"debug_token 呼び出し失敗（日付計算にフォールバック）: {exc}", flush=True)

          # ── フォールバック: 生成日 + 有効日数から推定 ──────────────────────
          if remaining is None:
              generated_str = os.environ.get("META_TOKEN_GENERATED_AT", "").strip()
              if not generated_str:
                  print("META_TOKEN_GENERATED_AT が未設定のためスキップします", flush=True)
                  sys.exit(0)

              try:
                  generated = date.fromisoformat(generated_str)
              except ValueError:
                  print(f"日付フォーマットエラー: {generated_str}", flush=True)
                  sys.exit(1)

              expires_days = int(os.environ.get("META_TOKEN_EXPIRES_DAYS", "60"))
              elapsed = (today - generated).days
              remaining = expires_days - elapsed
              expire_date = generated + timedelta(days=expires_days)
              source = "生成日から推定"
              print(f"生成日: {generated}  経過: {elapsed}日  残り: {remaining}日", flush=True)

          # 通知するタイミング（または強制通知フラグ）。失効後（残り0日以下）は毎日通知する
          force = os.environ.get("FORCE_NOTIFY", "false").lower() == "true"
          notify_at = {14, 10, 7, 5, 4, 3, 2, 1}
          if not force and remaining not in notify_at and remaining > 0:
              print("通知タイミングではありません", flush=True)
              sys.exit(0)
          if force:
              print("強制通知モードで送信します", flush=True)

          webhook_url = os.environ.get("SLACK_WEBHOOK_URL", "").strip()
          if not webhook_url:
              print("SLACK_WEBHOOK_URL が未設定のためスキップします", flush=True)
              sys.exit(0)

          # 緊急度に応じた絵文字・色
          if remaining <= 0:
              emoji = "🚨"
              color = "#EF4444"
              urgency = "失効済み"
          elif remaining <= 3:
              emoji = "🚨"
              color = "#EF4444"
              urgency = "緊急"
          elif remaining <= 7:
              emoji = "⚠️"
              color = "#F59E0B"
              urgency = "警告"
          else:
              emoji = "🔔"
              color = "#3B82F6"
              urgency = "お知らせ"

          if remaining <= 0:
              header_text = f"{emoji} [{urgency}] Meta トークンが失効しています（{-remaining} 日経過）"
          else:
              header_text = f"{emoji} [{urgency}] Meta トークンがあと {remaining} 日で失効します"

          payload = {
              "attachments": [
                  {
                      "color": color,
                      "blocks": [
                          {
                              "type": "header",
                              "text": {
                                  "type": "plain_text",
                                  "text": header_text,
                              },
                          },
                          {
                              "type": "section",
                              "fields": [
                                  {"type": "mrkdwn", "text": f"*失効日（{source}）*\n{expire_date}"},
                                  {"type": "mrkdwn", "text": f"*残り日数*\n*{remaining} 日*"},
                                  {"type": "mrkdwn", "text": f"*対象アプリ*\nabil-weekly-report"},
                              ],
                          },
                          {
                              "type": "section",
                              "text": {
                                  "type": "mrkdwn",
                                  "text": (
                                      "*対応手順*\n"
                                      "1. <https://business.facebook.com/latest/settings/system_users|Meta Business Suite → システムユーザー> を開く\n"
                                      "2. `abil_weekly-automation` → *トークンを生成*\n"
                                      "3. アプリ: `abil-weekly-report` / 有効期限: *60日* を選択\n"
                                      "4. 新しいトークンを GitHub Secrets の `META_ACCESS_TOKEN` に更新\n"
                                      "5. `META_TOKEN_GENERATED_AT` も今日の日付に更新（フォールバック用）"
                                  ),
                              },
                          },
                      ],
                  }
              ]
          }

          req = urllib.request.Request(
              webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req, timeout=10) as resp:
              print(f"Slack 通知送信完了: {resp.status}", flush=True)
          EOF
