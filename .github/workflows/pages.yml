# Shopify データ取得 → レポート HTML 生成 → GitHub Pages デプロイ
# 手動実行（workflow_dispatch）または毎週月曜 0:01 JST（日曜 15:01 UTC）に自動実行
# Slack 通知は別ワークフロー（notify-slack.yml / 月曜 7:00 JST）
name: Deploy Weekly Report

on:
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'コミット済みの _site をそのまま再デプロイする（データ取得・レポート生成をスキップ）'
        type: boolean
        default: false
  schedule:
    - cron: '1 15 * * 0'  # 毎週月曜 00:01 JST（日曜 15:01 UTC）

permissions:
  contents: write   # レポートファイルとインデックスを repo にコミットするため
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git push のために必要

      - name: Python 依存インストール
        run: python3 -m pip install -q -r src/requirements.txt

      # ── Shopify データ取得 ──────────────────────────────────────────────
      # deploy_only 時はデータ取得〜レポート生成〜コミットをすべてスキップし、
      # コミット済みの _site を再デプロイするだけにする（デプロイ失敗からの復旧用）
      - name: Shopify データ取得 → build/shopify_fragment.json
        if: ${{ !inputs.deploy_only }}
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
        run: |
          python3 src/fetch_shopify.py \
            --merge-into src/data/sample_report.json \
            -o build/report_merged.json

      # ── Meta 広告データ取得 ────────────────────────────────────────────
      - name: Meta 広告データ取得 → build/report_merged.json に追記
        if: ${{ !inputs.deploy_only }}
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: |
          python3 src/fetch_meta.py \
            --base build/report_merged.json \
            --out  build/report_merged.json
        continue-on-error: true   # Meta API 失敗時もレポート生成を継続

      # ── Google 広告データ取得 ──────────────────────────────────────────
      - name: Google 広告データ取得 → build/report_merged.json に追記
        if: ${{ !inputs.deploy_only }}
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: |
          python3 src/fetch_google_ads.py \
            --base build/report_merged.json \
            --out  build/report_merged.json
        continue-on-error: true   # Google API 失敗時もレポート生成を継続

      # ── 過去4週トレンドをAPI実データで更新 ─────────────────────────────
      - name: 売上・広告費 推移（過去4週）を更新
        if: ${{ !inputs.deploy_only }}
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: |
          python3 src/update_trend_chart.py \
            --base build/report_merged.json \
            --out  build/report_merged.json \
            --weeks 4 \
            --allow-partial
        continue-on-error: true   # トレンド更新失敗時もレポート生成を継続

      # ── Google Sheets にデータ追記（週次蓄積）────────────────────────────
      - name: Google Sheets に週次データを追記
        if: ${{ !inputs.deploy_only }}
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
        run: |
          python3 src/append_to_sheets.py \
            --base build/report_merged.json
        continue-on-error: true   # Sheets 書き込み失敗時もレポート生成を継続

      # ── 異常値・注意アラート（JSON の report.alert / report.alerts を更新）────
      - name: 異常値・注意アラートを生成 → build/report_merged.json
        if: ${{ !inputs.deploy_only }}
        run: |
          python3 src/generate_alerts.py \
            --base build/report_merged.json \
            --out  build/report_merged.json

      # ── LLM: 改善アクション3件（JSON の report.actions を更新）──────────
      - name: LLM で改善アクションを生成 → build/report_merged.json
        if: ${{ !inputs.deploy_only }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GENERATE_ACTIONS_PROVIDER: ${{ secrets.GENERATE_ACTIONS_PROVIDER }}
        run: |
          python3 - <<'PYCHECK'
          import os
          for name in ("OPENAI_API_KEY", "ANTHROPIC_API_KEY"):
              v = (os.environ.get(name) or "").strip()
              print(f"LLM diagnostics: {name}={'set' if v else 'missing'}")
          prov = (os.environ.get("GENERATE_ACTIONS_PROVIDER") or "").strip()
          print(f"LLM diagnostics: GENERATE_ACTIONS_PROVIDER={prov or '(unset)'}")
          PYCHECK
          python3 src/generate_actions.py \
            --base build/report_merged.json \
            --out  build/report_merged.json \
            --soft-fail
        continue-on-error: true   # 予期しない例外（ファイルI/Oなど）のみ

      # ── 週スラッグを決定 ───────────────────────────────────────────────
      - name: 週スラッグを決定（WEEK_SLUG 環境変数）
        if: ${{ !inputs.deploy_only }}
        run: |
          python3 - <<'EOF'
          import json, os
          from datetime import date, timedelta

          data = json.loads(open("build/report_merged.json").read())
          period = data["report"].get("period_range", "")
          # "2026年4月27日（月）〜 2026年5月3日（日）" → 260427-260503
          import re
          nums = re.findall(r'(\d{4})年(\d{1,2})月(\d{1,2})日', period)
          if len(nums) >= 2:
              s = f"{nums[0][0][2:]}{int(nums[0][1]):02d}{int(nums[0][2]):02d}"
              e = f"{nums[1][0][2:]}{int(nums[1][1]):02d}{int(nums[1][2]):02d}"
              slug = f"weekly_report_{s}-{e}"
          else:
              today = date.today()
              mon = today - timedelta(days=today.weekday() + 7)
              sun = mon + timedelta(days=6)
              slug = f"weekly_report_{mon.strftime('%y%m%d')}-{sun.strftime('%y%m%d')}"

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"WEEK_SLUG={slug}\n")
              f.write(f"PERIOD_RANGE={period}\n")
          print(f"Slug: {slug}")
          EOF

      # ── 個別レポート HTML 生成 ─────────────────────────────────────────
      - name: レポート HTML 生成
        if: ${{ !inputs.deploy_only }}
        env:
          REPORT_PASSWORD_HASH: ${{ secrets.REPORT_PASSWORD_HASH }}
        run: |
          python3 src/generate_report.py \
            -i build/report_merged.json \
            -o _site/${{ env.WEEK_SLUG }}/index.html
          test -s _site/${{ env.WEEK_SLUG }}/index.html

      # ── reports_index.json を更新 ──────────────────────────────────────
      - name: reports_index.json に今週のエントリを追加
        if: ${{ !inputs.deploy_only }}
        run: |
          python3 - <<'EOF'
          import json, os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          idx_path = "src/data/reports_index.json"
          reports = json.loads(open(idx_path).read())

          slug = os.environ["WEEK_SLUG"]
          period = os.environ["PERIOD_RANGE"]
          d = datetime.now(ZoneInfo("Asia/Tokyo"))
          now_jst = f"{d.year}年{d.month}月{d.day}日 {d.hour:02d}:{d.minute:02d}"

          # overall_score と score_subtitle を merged JSON から取得
          try:
              merged = json.loads(open("build/report_merged.json").read())
              rep = merged.get("report") or {}
              overall_score = rep.get("overall_score") or "—"
              score_subtitle = rep.get("score_subtitle") or ""
          except Exception:
              overall_score = "—"
              score_subtitle = ""

          # 重複を防ぐ（同じスラッグなら上書き）
          reports = [r for r in reports if r.get("slug") != slug]
          reports.append({
              "slug": slug,
              "period": period,
              "generated_at": now_jst,
              "overall_score": overall_score,
              "score_subtitle": score_subtitle,
          })

          open(idx_path, "w").write(json.dumps(reports, ensure_ascii=False, indent=2) + "\n")
          print(f"Updated {idx_path}: {len(reports)} reports")
          EOF

      # ── トップページ（一覧）HTML 生成 ──────────────────────────────────
      # deploy_only 時もコミット済みの reports_index.json から再生成できる
      - name: トップページ（レポート一覧）生成
        env:
          REPORT_PASSWORD_HASH: ${{ secrets.REPORT_PASSWORD_HASH }}
        run: |
          python3 src/generate_index.py -o _site/index.html
          test -s _site/index.html
          touch _site/.nojekyll

      # ── repo にコミット（レポートファイル + インデックスを永続化）────────
      - name: 新レポートを repo にコミット
        if: ${{ !inputs.deploy_only }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f _site/${{ env.WEEK_SLUG }}/ _site/index.html
          git add src/data/reports_index.json
          git diff --cached --quiet || git commit -m "report: ${{ env.WEEK_SLUG }}"
          git push

      # ── GitHub Pages デプロイ ──────────────────────────────────────────
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # GitHub 側の一時エラー（Deployment failed, try again later. など）に備えて
      # 1回だけ自動リトライする
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: デプロイ失敗時は60秒待って再試行
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      # ── 失敗時アラート（従来はデプロイ失敗に気づけず URL が 404 のままだった）──
      - name: 失敗時に Slack へアラート
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL が未設定のためスキップします"
            exit 0
          fi
          python3 - <<'EOF'
          import json, os, urllib.request

          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
              f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )
          text = (
              ":rotating_light: *週次レポートのデプロイに失敗しました*\n"
              "最新レポートの URL が 404 のままになっている可能性があります。\n"
              f"・実行ログ: {run_url}\n"
              "・復旧手順: Actions → Deploy Weekly Report → Run workflow で "
              "`deploy_only=true` を指定して再デプロイ"
          )
          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps({"text": text}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req, timeout=10) as resp:
              print(f"Slack 通知送信完了: {resp.status}")
          EOF

      # Slack 通知は notify-slack.yml（月曜 7:00 JST）に分離
