# Python や Secrets を足す前のスモーク用。push / PR / 手動で動かせる。
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 必須ファイルの存在確認
        run: |
          test -f README.md
          test -f docs/ROADMAP.md
          test -d reference
