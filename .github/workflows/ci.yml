# Python や Secrets を足す前のスモーク用。push / PR / 手動で動かせる。
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 必須ファイルの存在確認
        run: |
          test -f README.md
          test -f docs/ROADMAP.md
          test -d reference

      - name: Python — レポート HTML 生成（フェーズ1）＋ Shopify 取得スクリプト構文
        run: |
          python3 -m pip install -q -r src/requirements.txt
          python3 -m py_compile src/fetch_shopify.py
          python3 -m py_compile src/generate_actions.py
          python3 -m py_compile src/post_slack.py
          python3 src/generate_actions.py \
            --base src/data/sample_report.json \
            --out build/report_actions.json
          python3 src/generate_report.py -i build/report_actions.json -o build/report.html
          python3 src/post_slack.py --report-url https://example.invalid/test/ \
            --period "CIスモーク" --overall-score "—" --summary-line "Webhook なしではスキップ"
          test -s build/report.html
